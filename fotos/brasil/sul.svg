<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F1E5"/>
      <stop offset="55%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#E8DCC0"/>
    </linearGradient>
    <linearGradient id="seaS" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1F1B16" stop-opacity="0.65"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="510" fill="url(#skyS)"/>

  <!-- Sun -->
  <circle cx="200" cy="180" r="50" fill="#C9A96E" opacity="0.7"/>

  <!-- Distant hills (back layer) -->
  <path d="M0,420 Q150,380 350,400 T700,395 T1050,400 T1200,410 L1200,510 L0,510 Z" fill="#1F1B16" opacity="0.22"/>

  <!-- Mid hills (Morro da Cruz, Costão) -->
  <path d="M0,460 Q200,400 400,440 T700,430 T1000,445 L1200,440 L1200,510 L0,510 Z" fill="#1F1B16" opacity="0.4"/>

  <!-- Front hills -->
  <path d="M0,505 Q300,455 600,490 T1000,485 L1200,495 L1200,510 L0,510 Z" fill="#1F1B16" opacity="0.65"/>

  <!-- Ponte Hercílio Luz (suspension bridge) -->
  <g transform="translate(380,360)" stroke="#1F1B16" fill="none" stroke-linecap="round">
    <!-- Main suspension cables (parabolic) -->
    <path d="M-110,150 Q-50,30 0,90 Q90,30 220,30 Q310,30 410,90 Q470,30 530,150" stroke-width="2.2"/>
    <!-- Pylon left tower -->
    <g stroke-width="2.4">
      <line x1="0" y1="150" x2="0" y2="-30"/>
      <line x1="40" y1="150" x2="40" y2="-30"/>
      <line x1="0" y1="-30" x2="40" y2="-30"/>
      <!-- Cross bracing -->
      <line x1="0" y1="20" x2="40" y2="20"/>
      <line x1="0" y1="60" x2="40" y2="60"/>
      <line x1="0" y1="100" x2="40" y2="100"/>
      <line x1="0" y1="20" x2="40" y2="60"/>
      <line x1="40" y1="20" x2="0" y2="60"/>
      <line x1="0" y1="60" x2="40" y2="100"/>
      <line x1="40" y1="60" x2="0" y2="100"/>
    </g>
    <!-- Pylon right tower -->
    <g stroke-width="2.4" transform="translate(380,0)">
      <line x1="0" y1="150" x2="0" y2="-30"/>
      <line x1="40" y1="150" x2="40" y2="-30"/>
      <line x1="0" y1="-30" x2="40" y2="-30"/>
      <line x1="0" y1="20" x2="40" y2="20"/>
      <line x1="0" y1="60" x2="40" y2="60"/>
      <line x1="0" y1="100" x2="40" y2="100"/>
      <line x1="0" y1="20" x2="40" y2="60"/>
      <line x1="40" y1="20" x2="0" y2="60"/>
      <line x1="0" y1="60" x2="40" y2="100"/>
      <line x1="40" y1="60" x2="0" y2="100"/>
    </g>
    <!-- Bridge deck -->
    <line x1="-140" y1="150" x2="560" y2="150" stroke-width="3"/>
    <!-- Vertical hangers (suspension) -->
    <g stroke-width="1.2" opacity="0.85">
      <line x1="60" y1="80" x2="60" y2="150"/>
      <line x1="100" y1="60" x2="100" y2="150"/>
      <line x1="140" y1="48" x2="140" y2="150"/>
      <line x1="180" y1="42" x2="180" y2="150"/>
      <line x1="220" y1="40" x2="220" y2="150"/>
      <line x1="260" y1="42" x2="260" y2="150"/>
      <line x1="300" y1="48" x2="300" y2="150"/>
      <line x1="340" y1="60" x2="340" y2="150"/>
      <line x1="380" y1="80" x2="380" y2="150"/>
    </g>
  </g>

  <!-- Sea -->
  <rect y="510" width="1200" height="240" fill="url(#seaS)"/>

  <!-- Bridge reflection -->
  <g transform="translate(380,510)" opacity="0.25" stroke="#FAF8F5" stroke-linecap="round">
    <line x1="-110" y1="0" x2="-110" y2="50" stroke-width="1.5"/>
    <line x1="-70" y1="0" x2="-70" y2="35" stroke-width="1.2"/>
    <line x1="0" y1="0" x2="0" y2="60" stroke-width="2"/>
    <line x1="40" y1="0" x2="40" y2="60" stroke-width="2"/>
    <line x1="380" y1="0" x2="380" y2="60" stroke-width="2"/>
    <line x1="420" y1="0" x2="420" y2="60" stroke-width="2"/>
    <line x1="500" y1="0" x2="500" y2="35" stroke-width="1.2"/>
    <line x1="540" y1="0" x2="540" y2="50" stroke-width="1.5"/>
  </g>

  <!-- Wave lines -->
  <path d="M0,560 Q200,550 400,560 T800,560 T1200,560" fill="none" stroke="#FAF8F5" stroke-width="1.4" opacity="0.4"/>
  <path d="M0,620 Q300,610 600,620 T1200,620" fill="none" stroke="#FAF8F5" stroke-width="1.3" opacity="0.32"/>
  <path d="M0,680 Q200,670 400,680 T800,680 T1200,680" fill="none" stroke="#FAF8F5" stroke-width="1.2" opacity="0.25"/>

  <!-- Decorative ornament -->
  <g transform="translate(600,90)" opacity="0.5">
    <line x1="-40" y1="0" x2="-8" y2="0" stroke="#C9A96E" stroke-width="1.2"/>
    <rect x="-3" y="-3" width="6" height="6" transform="rotate(45)" fill="#C9A96E"/>
    <line x1="8" y1="0" x2="40" y2="0" stroke="#C9A96E" stroke-width="1.2"/>
  </g>
</svg>
