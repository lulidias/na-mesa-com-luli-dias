<svg viewBox="0 0 1200 750" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F1E5"/>
      <stop offset="65%" stop-color="#FAF8F5"/>
      <stop offset="100%" stop-color="#E8DCC0"/>
    </linearGradient>
    <linearGradient id="seaN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C9A96E" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1F1B16" stop-opacity="0.55"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1200" height="500" fill="url(#skyN)"/>

  <!-- Sun -->
  <circle cx="900" cy="240" r="62" fill="#C9A96E" opacity="0.85"/>
  <circle cx="900" cy="240" r="100" fill="#C9A96E" opacity="0.15"/>

  <!-- Distant horizon line -->
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#1F1B16" stroke-width="0.8" opacity="0.3"/>

  <!-- Sea -->
  <rect y="500" width="1200" height="250" fill="url(#seaN)"/>

  <!-- Wave lines -->
  <path d="M0,530 Q200,520 400,530 T800,530 T1200,530" fill="none" stroke="#FAF8F5" stroke-width="1.5" opacity="0.45"/>
  <path d="M0,575 Q300,565 600,575 T1200,575" fill="none" stroke="#FAF8F5" stroke-width="1.4" opacity="0.35"/>
  <path d="M0,625 Q200,615 400,625 T800,625 T1200,625" fill="none" stroke="#FAF8F5" stroke-width="1.3" opacity="0.28"/>
  <path d="M0,680 Q250,670 500,680 T1000,680 T1200,680" fill="none" stroke="#FAF8F5" stroke-width="1.2" opacity="0.22"/>

  <!-- Palm tree left -->
  <g transform="translate(150,260)">
    <path d="M-3,0 Q-12,140 -28,280" stroke="#1F1B16" stroke-width="6" fill="none" stroke-linecap="round"/>
    <g stroke="#1F1B16" stroke-width="5" fill="none" stroke-linecap="round">
      <path d="M0,0 Q-60,-25 -130,-15"/>
      <path d="M0,0 Q60,-25 130,-15"/>
      <path d="M0,0 Q-35,-55 -55,-115"/>
      <path d="M0,0 Q35,-55 55,-115"/>
      <path d="M0,0 Q-95,25 -140,42"/>
      <path d="M0,0 Q95,25 140,42"/>
    </g>
    <!-- Coconuts -->
    <circle cx="-3" cy="5" r="4" fill="#1F1B16"/>
    <circle cx="5" cy="8" r="4" fill="#1F1B16"/>
  </g>

  <!-- Palm tree right (smaller) -->
  <g transform="translate(1080,210)">
    <path d="M2,0 Q14,160 22,320" stroke="#1F1B16" stroke-width="5" fill="none" stroke-linecap="round"/>
    <g stroke="#1F1B16" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M0,0 Q-50,-22 -110,-12"/>
      <path d="M0,0 Q50,-22 110,-12"/>
      <path d="M0,0 Q-28,-48 -45,-100"/>
      <path d="M0,0 Q28,-48 45,-100"/>
      <path d="M0,0 Q-80,22 -120,38"/>
      <path d="M0,0 Q80,22 120,38"/>
    </g>
  </g>

  <!-- Jangada (sailing raft) -->
  <g transform="translate(620,475)">
    <!-- Sail -->
    <path d="M0,-115 L0,-5 L88,-5 Z" fill="#FAF8F5" stroke="#1F1B16" stroke-width="2.2"/>
    <!-- Mast -->
    <line x1="0" y1="-122" x2="0" y2="3" stroke="#1F1B16" stroke-width="2.5"/>
    <!-- Boat hull -->
    <path d="M-72,0 L72,0 L60,16 L-60,16 Z" fill="#1F1B16"/>
    <!-- Sail detail -->
    <line x1="0" y1="-115" x2="88" y2="-5" stroke="#1F1B16" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Reflection of jangada -->
  <g transform="translate(620,495)" opacity="0.25">
    <line x1="0" y1="0" x2="0" y2="40" stroke="#1F1B16" stroke-width="2"/>
    <line x1="-50" y1="0" x2="-50" y2="25" stroke="#1F1B16" stroke-width="1.5"/>
    <line x1="50" y1="0" x2="50" y2="25" stroke="#1F1B16" stroke-width="1.5"/>
  </g>

  <!-- Decorative ornament center top -->
  <g transform="translate(600,90)" opacity="0.5">
    <line x1="-40" y1="0" x2="-8" y2="0" stroke="#C9A96E" stroke-width="1.2"/>
    <rect x="-3" y="-3" width="6" height="6" transform="rotate(45)" fill="#C9A96E"/>
    <line x1="8" y1="0" x2="40" y2="0" stroke="#C9A96E" stroke-width="1.2"/>
  </g>
</svg>
