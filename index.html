<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Na Mesa com Luli Dias — Guia Gastronômico</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F3EE;--white:#FFFFFF;--ink:#1A1A1A;--ink-lt:#5A5A5A;
  --gold:#B8922A;--gold-lt:#D4AE5C;--gold-bg:#FAF5EB;--border:#E8E0D5;
}
html,body{height:100%}
body{background:var(--cream);color:var(--ink);font-family:'Montserrat',sans-serif;min-height:100vh}

header{background:var(--white);border-bottom:1px solid var(--border);padding:36px 32px 28px;text-align:center}
.brand-pre{font-size:7px;letter-spacing:7px;text-transform:uppercase;color:var(--gold);font-weight:500;margin-bottom:10px}
.brand-main{font-family:'Playfair Display',serif;font-size:36px;font-weight:400;color:var(--ink);line-height:1.15}
.brand-main em{font-style:italic;color:var(--gold)}
.brand-sub{font-size:7px;letter-spacing:5px;text-transform:uppercase;color:#bbb;margin-top:10px;font-weight:300}
.header-orn{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:16px}
.orn-line{height:1px;width:48px;background:linear-gradient(90deg,transparent,var(--gold))}
.orn-line.r{background:linear-gradient(90deg,var(--gold),transparent)}
.orn-diamond{width:5px;height:5px;background:var(--gold);transform:rotate(45deg)}

.global-stats{background:var(--gold-bg);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;justify-content:center;flex-wrap:wrap;gap:0}
.gstat{padding:10px 24px;text-align:center;border-right:1px solid var(--border)}
.gstat:last-child{border-right:none}
.gstat-num{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);font-weight:600}
.gstat-lbl{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-lt);margin-top:2px}

main{max-width:1100px;margin:0 auto;padding:40px 24px 60px}

.region-div{display:flex;align-items:center;gap:16px;margin:44px 0 20px}
.rd-l,.rd-r{flex:1;height:1px;background:var(--border)}
.rd-name{font-size:15px;letter-spacing:4px;text-transform:uppercase;color:var(--ink-lt);white-space:nowrap;font-weight:500;padding:0 8px}

.countries-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}

.card{display:block;text-decoration:none;color:inherit;background:var(--white);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.1)}
.card.coming-soon{opacity:.6;pointer-events:none;cursor:default}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:#eee}
.card-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,#f0e8d8,#e8dcc8);display:flex;align-items:center;justify-content:center;font-size:48px}
.card-body{padding:16px}
.card-flag-name{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-flag{font-size:20px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--ink)}
.card-region{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-lt);margin-bottom:10px}
.card-cities{font-size:10px;color:#888;margin-bottom:10px;line-height:1.5}
.card-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px}
.card-count{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold)}
.card-count-lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-lt)}
.card-michelin{font-size:9px;color:var(--gold);background:var(--gold-bg);padding:3px 8px;border-radius:2px;letter-spacing:1px}
.card-arrow{font-size:9px;color:var(--gold);letter-spacing:1px}
.coming-badge{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#aaa;background:#f5f5f5;padding:3px 8px;border-radius:2px}

footer{text-align:center;padding:32px;border-top:1px solid var(--border);background:var(--white)}
footer p{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#bbb}
</style>
</head>
<body>
<header>
  <div class="brand-pre">Guia Gastronômico Pessoal</div>
  <div class="brand-main">Na Mesa com <em>Luli Dias</em></div>
  <div class="header-orn"><div class="orn-line"></div><div class="orn-diamond"></div><div class="orn-line r"></div></div>
  <div class="brand-sub">Restaurantes · Vinhos · Experiências</div>
  <div style="margin-top:16px"><a href="sobre.html" style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid var(--gold);padding:6px 16px">Sobre o Curador →</a></div>
</header>
<div class="global-stats">
  <div class="gstat"><div class="gstat-num">29</div><div class="gstat-lbl">Países</div></div>
  <div class="gstat"><div class="gstat-num">443</div><div class="gstat-lbl">Restaurantes</div></div>
  <div class="gstat"><div class="gstat-num">77 ★</div><div class="gstat-lbl">Estrelas Michelin</div></div>
  <div class="gstat"><div class="gstat-num">6</div><div class="gstat-lbl">Continentes</div></div>
</div>
<main id="main"></main>
<footer style="text-align:center;padding:32px;font-size:11px;color:#bbb;letter-spacing:2px;text-transform:uppercase;border-top:1px solid var(--border)">
  <a href="sobre.html" style="color:var(--gold);text-decoration:none">Sobre o Curador</a> &nbsp;·&nbsp; Na Mesa com Luli Dias
</footer>
<script>
const REGIONS = [
  {
    name: 'Europa',
    countries: [
      { name:'Portugal', flag:'🇵🇹', region:'Sul da Europa', cities:'Lisboa · Porto · Alentejo · Algarve', restaurants:53, michelin:4, file:'portugal-guia.html', photo:'fotos/portugal/cover.jpg' },
      { name:'França', flag:'🇫🇷', region:'Europa Ocidental', cities:'Paris · Lyon · Bordeaux · Provence · Côte d\'Azur', restaurants:104, michelin:17, file:'franca-guia.html', photo:'fotos/franca/cover.jpg' },
      { name:'Espanha', flag:'🇪🇸', region:'Sul da Europa', cities:'Madrid · Barcelona · San Sebastián · Sevilha', restaurants:40, michelin:4, file:'espanha-guia.html', photo:'fotos/espanha/cover.jpg' },
      { name:'Itália', flag:'🇮🇹', region:'Sul da Europa', cities:'Alba · Verona · Milão · Florença · Modena', restaurants:24, michelin:6, file:'italia-guia.html', photo:'fotos/italia/cover.jpg' },
      { name:'Alemanha', flag:'🇩🇪', region:'Europa Central', cities:'Munique · Berlim · Hamburgo · Frankfurt', restaurants:11, michelin:4, file:'alemanha-guia.html', photo:'fotos/alemanha/cover.jpg' },
      { name:'Holanda', flag:'🇳🇱', region:'Europa Ocidental', cities:'Amesterdão', restaurants:8, michelin:5, file:'holanda-guia.html', photo:'fotos/holanda/cover.jpg' },
      { name:'Luxemburgo', flag:'🇱🇺', region:'Europa Central', cities:'Luxemburgo Cidade', restaurants:5, michelin:0, file:'luxemburgo-guia.html', photo:'fotos/luxemburgo/cover.jpg' },
      { name:'Irlanda', flag:'🇮🇪', region:'Europa Ocidental', cities:'Dublin · Cork · Galway', restaurants:10, michelin:3, file:'irlanda-guia.html', photo:'fotos/irlanda/cover.jpg' },
      { name:'Irlanda do Norte', flag:'🇬🇧', region:'Europa Ocidental', cities:'Belfast', restaurants:8, michelin:2, file:'irlanda-norte-guia.html', photo:'fotos/irlanda-norte/cover.jpg' },
      { name:'Reino Unido', flag:'🇬🇧', region:'Europa Ocidental', cities:'Londres', restaurants:3, michelin:1, file:'londres-guia.html', photo:'fotos/londres/cover.jpg' },
      { name:'Dinamarca', flag:'🇩🇰', region:'Europa do Norte', cities:'Copenhague', restaurants:4, michelin:1, file:'copenhague-guia.html', photo:'fotos/copenhague/cover.jpg' },
    ]
  },
  {
    name: 'Médio Oriente & África',
    countries: [
      { name:'Turquia', flag:'🇹🇷', region:'Médio Oriente', cities:'Istambul', restaurants:4, michelin:2, file:'turquia-guia.html', photo:'fotos/turquia/cover.jpg' },
      { name:'Dubai', flag:'🇦🇪', region:'Médio Oriente', cities:'Dubai', restaurants:2, michelin:0, file:'dubai-guia.html', photo:'fotos/dubai/cover.jpg' },
    ]
  },
  {
    name: 'Ásia',
    countries: [
      { name:'China', flag:'🇨🇳', region:'Ásia Oriental', cities:'Pequim · Xangai', restaurants:7, michelin:1, file:'china-guia.html', photo:'fotos/china/cover.jpg' },
      { name:'Japão', flag:'🇯🇵', region:'Ásia Oriental', cities:'Tóquio · Kyoto · Osaka · Kobe · Nara · Hakone', restaurants:32, michelin:0, file:'japao-guia.html', photo:'fotos/japao/cover.jpg' },
      { name:'Coreia do Sul', flag:'🇰🇷', region:'Ásia Oriental', cities:'Seul · Busan · Jeju', restaurants:20, michelin:1, file:'coreia-guia.html', photo:'fotos/coreia/cover.jpg' },
      { name:'Taiwan', flag:'🇹🇼', region:'Ásia Oriental', cities:'Taipei · Jiufen', restaurants:5, michelin:1, file:'taiwan-guia.html', photo:'fotos/taiwan/cover.jpg' },
      { name:'Vietnã', flag:'🇻🇳', region:'Sudeste Asiático', cities:'Hanói', restaurants:2, michelin:0, file:'vietna-guia.html', photo:'fotos/vietna/cover.jpg' },
      { name:'Hong Kong & Macau', flag:'🇭🇰', region:'Ásia Oriental', cities:'Hong Kong · Macau', restaurants:2, michelin:0, file:'hongkong-guia.html', photo:'fotos/hongkong/cover.jpg' },
    ]
  },
  {
    name: 'América do Norte',
    countries: [
      { name:'Estados Unidos', flag:'🇺🇸', region:'América do Norte', cities:'Miami · Nova Iorque', restaurants:9, michelin:1, file:'eua-guia.html', photo:'fotos/eua/cover.jpg' },
      { name:'Panamá', flag:'🇵🇦', region:'América Central', cities:'Cidade do Panamá', restaurants:2, michelin:0, file:'panama-guia.html', photo:'fotos/panama/cover.jpg' },
    ]
  },
  {
    name: 'América do Sul',
    countries: [
      { name:'Brasil', flag:'🇧🇷', region:'América do Sul', cities:'São Paulo · Rio de Janeiro', restaurants:0, michelin:0, file:'', photo:'', comingSoon:true },
      { name:'Argentina', flag:'🇦🇷', region:'América do Sul', cities:'Buenos Aires · Mendoza', restaurants:15, michelin:3, file:'argentina-guia.html', photo:'fotos/argentina/cover.jpg' },
      { name:'Peru', flag:'🇵🇪', region:'América do Sul', cities:'Lima · Cusco', restaurants:13, michelin:6, file:'peru-guia.html', photo:'fotos/peru/cover.jpg' },
      { name:'Uruguai', flag:'🇺🇾', region:'América do Sul', cities:'Montevidéu · Punta del Este · José Ignacio', restaurants:9, michelin:0, file:'uruguai-guia.html', photo:'fotos/uruguai/cover.jpg' },
      { name:'Chile', flag:'🇨🇱', region:'América do Sul', cities:'Santiago', restaurants:14, michelin:0, file:'chile-guia.html', photo:'fotos/chile/cover.jpg' },
      { name:'Colômbia', flag:'🇨🇴', region:'América do Sul', cities:'Cartagena', restaurants:2, michelin:0, file:'colombia-guia.html', photo:'fotos/colombia/cover.jpg' },
    ]
  },
  {
    name: 'Caribe',
    countries: [
      { name:'Curaçao', flag:'🇨🇼', region:'Caribe Holandês', cities:'Jan Thiel Baai', restaurants:1, michelin:0, file:'curacao-guia.html', photo:'fotos/curacao/cover.jpg' },
      { name:'Bonaire', flag:'🇧🇶', region:'Caribe Holandês', cities:'Kralendijk', restaurants:1, michelin:0, file:'bonaire-guia.html', photo:'fotos/bonaire/cover.jpg' },
    ]
  }
];

function buildCard(c) {
  const isComingSoon = !!c.comingSoon;
  const tag = isComingSoon ? 'div' : 'a';
  const href = isComingSoon ? '' : `href="${c.file}"`;
  const imgHtml = c.photo && !c.photo.endsWith('/')
    ? `<img class="card-img" src="${c.photo}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-img-placeholder" style="display:none">${c.flag}</div>`
    : `<div class="card-img-placeholder">${c.flag}</div>`;

  return `<${tag} class="card${isComingSoon?' coming-soon':''}" ${href}>
    ${imgHtml}
    <div class="card-body">
      <div class="card-flag-name"><span class="card-flag">${c.flag}</span><span class="card-name">${c.name}</span></div>
      <div class="card-region">${c.region}</div>
      <div class="card-cities">${c.cities}</div>
      <div class="card-footer">
        <div>
          <div class="card-count">${isComingSoon ? '—' : c.restaurants}</div>
          <div class="card-count-lbl">${isComingSoon ? 'em breve' : 'restaurantes'}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${c.michelin > 0 ? `<span class="card-michelin">★ ${c.michelin} Michelin</span>` : ''}
          ${isComingSoon ? `<span class="coming-badge">em breve</span>` : `<span class="card-arrow">Ver guia →</span>`}
        </div>
      </div>
    </div>
  </${tag}>`;
}

function build() {
  let html = '';
  REGIONS.forEach(region => {
    html += `
    <div class="region-div">
      <div class="rd-l"></div>
      <span class="rd-name">${region.name}</span>
      <div class="rd-r"></div>
    </div>
    <div class="countries-grid">
      ${region.countries.map(buildCard).join('')}
    </div>`;
  });
  document.getElementById('main').innerHTML = html;
}

build();
</script>
</body>
</html>
