<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luli Dias — Restaurants &amp; Hotels</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --cream:#F7F3EE;--white:#FFFFFF;--ink:#1A1A1A;--ink-lt:#5A5A5A;
  --gold:#B8922A;--gold-lt:#D4AE5C;--gold-bg:#FAF5EB;--border:#E8E0D5;
}
html,body{height:100%}
body{background:var(--cream);color:var(--ink);font-family:'Montserrat',sans-serif;min-height:100vh}

header{background:var(--white);border-bottom:1px solid var(--border);padding:48px 32px 36px;text-align:center}
.brand-name{font-family:Didot,'Bodoni 72','Playfair Display',Georgia,serif;font-size:54px;font-weight:400;color:var(--ink);line-height:1;letter-spacing:18px;padding-left:18px}
.brand-tagline{font-family:Didot,'Playfair Display',Georgia,serif;font-size:11px;font-weight:400;color:var(--ink);letter-spacing:8px;padding-left:8px;margin-top:0}
.header-orn{display:flex;align-items:center;justify-content:center;gap:12px;margin:14px 0 14px}
.orn-line{height:1px;width:48px;background:linear-gradient(90deg,transparent,var(--gold))}
.orn-line.r{background:linear-gradient(90deg,var(--gold),transparent)}
.orn-diamond{width:5px;height:5px;background:var(--gold);transform:rotate(45deg)}

.global-stats{background:var(--gold-bg);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;justify-content:center;flex-wrap:wrap;gap:0}
.gstat{padding:10px 24px;text-align:center;border-right:1px solid var(--border)}
.gstat:last-child{border-right:none}
.gstat-num{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);font-weight:600}
.gstat-lbl{font-size:7px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-lt);margin-top:2px}

main{max-width:1100px;margin:0 auto;padding:40px 24px 60px}

.region-div{display:flex;align-items:center;gap:16px;margin:44px 0 20px}
.cont-bar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 48px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;position:sticky;top:0;z-index:50}
.cont-lbl{font-size:7px;letter-spacing:4px;text-transform:uppercase;color:var(--ink-lt);margin-right:4px;white-space:nowrap}
.cont-btn{font-family:'Montserrat',sans-serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;font-weight:500;padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--ink-lt);cursor:pointer;transition:all .2s}
.cont-btn:hover{border-color:var(--gold);color:var(--gold)}
.cont-btn.active{background:var(--gold);border-color:var(--gold);color:var(--white)}

.rd-l,.rd-r{flex:1;height:1px;background:var(--border)}
.rd-name{font-size:15px;letter-spacing:4px;text-transform:uppercase;color:var(--ink-lt);white-space:nowrap;font-weight:500;padding:0 8px}

.countries-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}

.card{display:block;text-decoration:none;color:inherit;background:var(--white);border:1px solid var(--border);border-radius:4px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:pointer}
.card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(0,0,0,.1)}
.card.coming-soon{opacity:.6;pointer-events:none;cursor:default}
.card-img{width:100%;height:160px;object-fit:cover;display:block;background:#eee}
.card-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,#f0e8d8,#e8dcc8);display:flex;align-items:center;justify-content:center;font-size:48px}
.card-body{padding:16px}
.card-flag-name{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.card-flag{font-size:20px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:var(--ink)}
.card-region{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-lt);margin-bottom:10px}
.card-cities{font-size:10px;color:#888;margin-bottom:10px;line-height:1.5}
.card-footer{display:flex;justify-content:space-between;align-items:flex-end;margin-top:10px}
.card-count{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold)}
.card-count-lbl{font-size:8px;letter-spacing:1px;text-transform:uppercase;color:var(--ink-lt)}
.card-michelin{font-size:9px;color:var(--gold);background:var(--gold-bg);padding:3px 8px;border-radius:2px;letter-spacing:1px}
.card-arrow{font-size:9px;color:var(--gold);letter-spacing:1px}
.coming-badge{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:#aaa;background:#f5f5f5;padding:3px 8px;border-radius:2px}

footer{text-align:center;padding:32px;border-top:1px solid var(--border);background:var(--white)}
footer p{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:#bbb}
.nearme-modal{display:none;position:fixed;inset:0;z-index:1000;align-items:center;justify-content:center;background:rgba(0,0,0,.5);padding:0}
.nearme-modal.open{display:flex}
.nearme-sheet{background:var(--white);border-radius:8px;width:100%;max-width:1100px;height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.18);position:relative;overflow:hidden}
.nearme-header{padding:20px 24px 14px;border-bottom:1px solid var(--border);text-align:center;flex-shrink:0}
.nearme-close{position:absolute;top:12px;right:12px;background:none;border:none;font-size:28px;cursor:pointer;color:var(--ink-lt);width:36px;height:36px;line-height:1;z-index:5}
.nearme-close:hover{color:var(--ink)}
.nearme-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);font-weight:400}
.nearme-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--ink-lt);margin-top:4px}
#nearmeContent{flex:1;min-height:0;display:flex;flex-direction:column}
#nearmeMap{flex:1;min-height:0;width:100%}
.nearme-loading,.nearme-error{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;color:var(--ink-lt);font-size:13px}
.nearme-spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--gold);border-radius:50%;border-top-color:transparent;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.leaflet-tooltip.custom-tooltip{background:#fff;border:1px solid #E8E0D5;border-radius:6px;padding:8px 12px;box-shadow:0 4px 12px rgba(0,0,0,.08);font-family:'Montserrat',sans-serif}
.leaflet-tooltip.custom-tooltip:before{display:none}
.leaflet-popup-content{margin:14px 18px;line-height:1.4}
.leaflet-popup-content-wrapper{border-radius:6px}
.nearme-cta{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom,0px));right:24px;z-index:1100;background:var(--ink);color:var(--white);border:none;border-radius:50px;padding:14px 22px;font-family:'Montserrat',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500;cursor:pointer;box-shadow:0 6px 20px rgba(0,0,0,.25);display:flex;align-items:center;gap:8px;transition:transform .2s,background .2s}
.nearme-cta:hover{transform:translateY(-2px);background:var(--gold)}
.nearme-cta-icon{width:14px;height:14px;border:2px solid currentColor;border-radius:50%;position:relative}
.nearme-cta-icon::after{content:'';position:absolute;top:50%;left:50%;width:4px;height:4px;background:currentColor;border-radius:50%;transform:translate(-50%,-50%)}
@media(max-width:640px){.nearme-cta{bottom:calc(80px + env(safe-area-inset-bottom,0px));right:16px;padding:12px 18px;font-size:10px;letter-spacing:2px}}
.type-bar-idx{display:flex;justify-content:center;gap:10px;padding:14px 20px;background:var(--gold-bg);border-bottom:1px solid var(--border);flex-wrap:wrap}
.type-btn-idx{font-family:'Montserrat',sans-serif;font-size:10px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;padding:8px 22px;border:1px solid var(--border);border-radius:24px;background:var(--white);color:var(--ink-lt);cursor:pointer;transition:all .2s}
.type-btn-idx:hover{border-color:var(--gold);color:var(--gold)}
.type-btn-idx.active{background:var(--gold);border-color:var(--gold);color:var(--white)}
</style>
</head>

  <div style="margin-top:24px"><a href="sobre.html" style="font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);text-decoration:none;border:1px solid var(--gold);padding:6px 16px">Sobre o Curador →</a></div>

</div>
<div class="cont-bar" id="contBar"></div>
<main id="main"></main>
<footer style="text-align:center;padding:32px;font-size:11px;color:#bbb;letter-spacing:2px;text-transform:uppercase;border-top:1px solid var(--border)">
  <a href="sobre.html" style="color:var(--gold);text-decoration:none">Sobre o Curador</a> &nbsp;·&nbsp; Luli Dias · Restaurants &amp; Hotels

<button class="nearme-cta" onclick="openNearMe()" aria-label="Restaurantes perto de mim"><span class="nearme-cta-icon"></span> Perto de Mim</button>
<div class="nearme-modal" id="nearmeModal" onclick="if(event.target===this)closeNearMe()">
  <div class="nearme-sheet">
    <button class="nearme-close" onclick="closeNearMe()" aria-label="Fechar">&times;</button>
    <div class="nearme-header">
      <div class="nearme-title">Perto de Ti</div>

    </div>

// Build continent filter bar (dinâmico — reage ao idxType)
const bar = document.getElementById('contBar');
function rebuildContinentBar(){
  let visibleRegions = REGIONS;
  if (idxType === 'h') visibleRegions = REGIONS.filter(r => r.countries.some(c => c.hotels > 0));
  else if (idxType === 'r') visibleRegions = REGIONS.filter(r => r.countries.some(c => c.restaurants > 0));
  const continents = ['Todos', ...visibleRegions.map(r => r.name)];
  // Se o continente activo deixou de existir, voltar a 'Todos'
  if (typeof activeCont !== 'undefined' && activeCont !== 'Todos' && !visibleRegions.find(r => r.name === activeCont)) {
    activeCont = 'Todos';
  }
  bar.innerHTML = '<span class="cont-lbl">Continente:</span>' +
    continents.map(c => `<button class="cont-btn${c===activeCont?' active':''}" onclick="setContinent('${c}',this)">${c}</button>`).join('');
}


let idxType='all';
function setIdxType(t,btn){
  idxType=t;
  document.querySelectorAll('.type-btn-idx').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  rebuildContinentBar();
  build();
}

let activeCont = 'Todos';
rebuildContinentBar();
function setContinent(name, btn) {
  activeCont = name;
  document.querySelectorAll('.cont-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  build();
}

function buildCard(c) {
  const isComingSoon = !!c.comingSoon;
  const tag = isComingSoon ? 'div' : 'a';
  const typeParam = idxType !== 'all' ? `?type=${idxType}` : '';
  const href = isComingSoon ? '' : `href="${c.file}${typeParam}"`;
  const imgHtml = c.photo && !c.photo.endsWith('/')
    ? `<img class="card-img" src="${c.photo}" alt="${c.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
      + `<div class="card-img-placeholder" style="display:none">${c.flag}</div>`
    : `<div class="card-img-placeholder">${c.flag}</div>`;

  return `<${tag} class="card${isComingSoon?' coming-soon':''}" ${href}>
    ${imgHtml}
    <div class="card-body">
      <div class="card-flag-name"><span class="card-flag">${c.flag}</span><span class="card-name">${c.name}</span></div>
      <div class="card-region">${c.region}</div>
      <div class="card-cities">${c.cities}</div>
      <div class="card-footer">
        <div>
          <div class="card-count">${isComingSoon ? '—' : (idxType==='h' ? (c.hotels||0) : idxType==='r' ? c.restaurants : c.restaurants)}</div>
          <div class="card-count-lbl">${isComingSoon ? 'em breve' : (idxType==='h' ? (c.hotels===1?'hotel':'hotéis') : 'restaurantes')}</div>
          ${!isComingSoon && idxType==='all' && c.hotels>0 ? `<div class="card-count-lbl" style="margin-top:4px">+ ${c.hotels} ${c.hotels===1?'hotel':'hotéis'}</div>` : ''}
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          ${c.michelin > 0 ? `<span class="card-michelin">★ ${c.michelin} Michelin</span>` : ''}
          ${isComingSoon ? `<span class="coming-badge">em breve</span>` : `<span class="card-arrow">Ver guia →</span>`}
        </div>
      </div>
    </div>
  </${tag}>`;
}

function build() {
  let html = '';
  const baseFiltered = activeCont === 'Todos' ? REGIONS : REGIONS.filter(r => r.name === activeCont);
  // Filtrar países sem entradas do tipo escolhido + esconder regiões vazias
  const filtered = idxType === 'h' 
    ? baseFiltered.map(r => ({...r, countries: r.countries.filter(c => c.hotels>0)})).filter(r => r.countries.length > 0)
    : idxType === 'r'
    ? baseFiltered.map(r => ({...r, countries: r.countries.filter(c => c.restaurants>0)})).filter(r => r.countries.length > 0)
    : baseFiltered;
  filtered.forEach(region => {
    html += `
    <div class="region-div">
      <div class="rd-l"></div>
      <span class="rd-name">${region.name}</span>
      <div class="rd-r"></div>
    </div>
    <div class="countries-grid">
      ${region.countries.map(buildCard).join('')}
    </div>`;
  });
  document.getElementById('main').innerHTML = html;
}

build();

const COUNTRY_NAMES={portugal:'Portugal',franca:'França',espanha:'Espanha',italia:'Itália',alemanha:'Alemanha',holanda:'Holanda',liechtenstein:'Liechtenstein',monaco:'Mónaco',luxemburgo:'Luxemburgo',irlanda:'Irlanda','irlanda-norte':'Irlanda do Norte',londres:'Reino Unido',copenhague:'Dinamarca',croacia:'Croácia',turquia:'Turquia',dubai:'Dubai',china:'China',japao:'Japão',coreia:'Coreia do Sul',taiwan:'Taiwan',vietna:'Vietnã',hongkong:'Hong Kong & Macau',tailandia:'Tailândia',eua:'Estados Unidos',panama:'Panamá',curacao:'Curaçao',aruba:'Aruba',bonaire:'Bonaire',brasil:'Brasil',argentina:'Argentina',peru:'Peru',uruguai:'Uruguai',chile:'Chile',colombia:'Colômbia'};
function countryFile(c){return c==='brasil'?'brasil-index.html':c+'-guia.html';}
function countryName(c){return COUNTRY_NAMES[c]||c;}
function haversine(la1,lo1,la2,lo2){const R=6371,p1=la1*Math.PI/180,p2=la2*Math.PI/180,dp=(la2-la1)*Math.PI/180,dl=(lo2-lo1)*Math.PI/180;const a=Math.sin(dp/2)**2+Math.cos(p1)*Math.cos(p2)*Math.sin(dl/2)**2;return 2*R*Math.asin(Math.sqrt(a));}
let nearmeMap=null;
function openNearMe(){
  document.getElementById('nearmeModal').classList.add('open');
  const el=document.getElementById('nearmeContent');
  el.className='nearme-loading';
  el.innerHTML='<div class="nearme-spinner"></div><div>A obter localização...</div>';
  if(!navigator.geolocation){showNearMeError('Geolocalização não disponível neste browser');return;}
  navigator.geolocation.getCurrentPosition(
    pos=>showNearMe(pos.coords.latitude,pos.coords.longitude),
    err=>showNearMeError('Não consegui obter a tua localização. Verifica as permissões do browser.'),
    {enableHighAccuracy:false,timeout:15000,maximumAge:300000}
  );
}
function closeNearMe(){document.getElementById('nearmeModal').classList.remove('open');}
function showNearMeError(msg){const el=document.getElementById('nearmeContent');el.className='nearme-error';el.innerHTML=msg;}
function showNearMe(myLat,myLng){
  const el=document.getElementById('nearmeContent');
  el.className='';
  el.innerHTML='<div id="nearmeMap"></div>';
  if(nearmeMap){nearmeMap.remove();nearmeMap=null;}
  const nearest=Object.entries(COORDS_ALL)
    .map(([k,r])=>({...r,key:k,dist:haversine(myLat,myLng,r.lat,r.lng)}))
    .sort((a,b)=>a.dist-b.dist)
    .slice(0,20);
  setTimeout(()=>{
    nearmeMap=L.map('nearmeMap',{scrollWheelZoom:true});
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:19}).addTo(nearmeMap);
    const myIcon=L.divIcon({className:'me-marker',html:'<div style="background:#1A1A1A;width:16px;height:16px;border-radius:50%;border:3px solid #fff;box-shadow:0 0 0 2px #1A1A1A"></div>',iconSize:[22,22],iconAnchor:[11,11]});
    const goldIcon=L.divIcon({className:'gold-marker',html:'<div style="background:#B8922A;width:14px;height:14px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #B8922A,0 2px 4px rgba(0,0,0,.3)"></div>',iconSize:[18,18],iconAnchor:[9,9],popupAnchor:[0,-9]});
    const meMarker=L.marker([myLat,myLng],{icon:myIcon}).addTo(nearmeMap);
    meMarker.bindTooltip('Estás aqui',{direction:'top',offset:[0,-8],permanent:false,className:'custom-tooltip'});
    const markers=[meMarker];
    nearest.forEach(r=>{
      const m=L.marker([r.lat,r.lng],{icon:goldIcon}).addTo(nearmeMap);
      const distStr=r.dist<1?Math.round(r.dist*1000)+' m':r.dist.toFixed(1)+' km';
      const cName=countryName(r.c);
      const cFile=countryFile(r.c);
      m.bindTooltip(`<div style="font-family:'Playfair Display',serif;font-size:13px;color:#1A1A1A;font-weight:500">${r.n}</div><div style="font-size:8px;letter-spacing:1.5px;color:#B8922A;text-transform:uppercase;margin-top:2px">${cName} · ${distStr}</div>`,{direction:'top',offset:[0,-8],opacity:0.95,className:'custom-tooltip'});
      m.bindPopup(`<div style="font-family:Montserrat,sans-serif;min-width:240px"><div style="font-family:'Playfair Display',serif;font-size:17px;color:#1A1A1A;margin-bottom:4px">${r.n}</div><div style="font-size:8px;letter-spacing:2px;color:#B8922A;text-transform:uppercase;font-weight:500;margin-bottom:6px">${cName} · ${distStr}</div><div style="font-size:11px;color:#5A5A5A;line-height:1.4;margin-bottom:10px">${r.a}</div><div style="display:flex;gap:8px;font-size:11px"><a href="${cFile}" style="color:#B8922A;text-decoration:underline">Ver guia</a><span style="color:#ccc">·</span><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(r.n+' '+r.a)}" target="_blank" style="color:#B8922A;text-decoration:underline">Abrir em Maps →</a></div></div>`);
      markers.push(m);
    });
    const group=L.featureGroup(markers);
    nearmeMap.fitBounds(group.getBounds().pad(0.15));
    setTimeout(()=>nearmeMap.invalidateSize(),100);
  },50);
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeNearMe();});
